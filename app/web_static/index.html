<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console</title>
    <link rel="stylesheet" href="/static/styles.css?v=25" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Agent Console</h1>
          <p>LangGraph agent 运行控制台</p>
        </div>
        <div class="topbar-actions">
          <form id="modelConfigForm" class="model-config-form">
            <label>
              <span>供应商</span>
              <select id="modelProviderSelect">
                <option value="openai">OpenAI</option>
                <option value="deepseek">DeepSeek</option>
                <option value="ollama">Ollama</option>
                <option value="llamacpp">llama.cpp</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <label>
              <span>模型</span>
              <select id="modelPresetSelect"></select>
            </label>
            <label id="modelNameField" class="model-name-field hidden">
              <span>模型名称</span>
              <input id="modelNameInput" type="text" placeholder="model name" />
            </label>
            <label class="base-url-field">
              <span>Base URL</span>
              <input id="modelBaseUrlInput" type="url" placeholder="https://..." />
            </label>
            <label class="token-field">
              <span>Token</span>
              <input id="modelApiKeyInput" type="password" autocomplete="off" placeholder="可选，留空使用默认" />
            </label>
            <button id="saveModelConfigBtn" class="button" type="submit">保存到浏览器</button>
          </form>
          <span id="connectionBadge" class="badge neutral">连接中</span>
          <span id="statusBadge" class="badge idle">空闲</span>
          <button id="stopBtn" class="button danger" type="button" disabled>停止任务</button>
          <button id="newSessionBtn" class="button" type="button">新建会话</button>
          <button id="clearBtn" class="button ghost" type="button">清空</button>
        </div>
      </header>

      <main class="workspace runtime-collapsed">
        <section class="panel chat-panel">
          <div class="panel-header">
            <h2>对话 <span id="modelConfigBadge" class="badge success model-config-badge">服务端默认</span></h2>
          </div>
          <div id="messageList" class="message-list"></div>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" rows="4" placeholder="输入任务或问题..."></textarea>
            <button id="sendBtn" class="button primary" type="submit">发送</button>
          </form>
        </section>

        <section class="panel runtime-panel">
          <div class="panel-header runtime-header">
            <div class="runtime-header-title">
              <h2>实时运行</h2>
              <span id="nodeBadge" class="badge neutral">无节点</span>
            </div>
            <button id="toggleRuntimeBtn" class="button ghost" title="收起/展开">❯</button>
          </div>


          <div class="runtime-section timeline-wrap">
            <div class="section-title">节点事件</div>
            <div id="eventList" class="event-list"></div>
          </div>
        </section>

        <aside class="panel progress-panel">
          <div class="panel-header">
            <h2>进度</h2>
          </div>

          <div class="summary-grid">
            <div class="summary-card">
              <span>复杂度</span>
              <strong id="complexityValue">unknown</strong>
            </div>
            <div class="summary-card">
              <span>当前节点</span>
              <strong id="currentNodeValue">-</strong>
            </div>
          </div>

          <div id="progressSplit" class="progress-split">
            <div class="runtime-section todo-wrap">
              <div class="section-title">Todo 进度</div>
              <div id="approvalList" class="approval-list empty">暂无审批</div>
              <div id="todoList" class="todo-list empty">暂无 todo</div>
            </div>

            <div id="progressResizeHandle" class="progress-resize-handle" role="separator" aria-orientation="horizontal" aria-label="调整 Todo 进度和路由编排高度" tabindex="0"></div>

            <div class="runtime-section route-wrap">
              <div class="section-title">路由编排</div>
              <div id="routeList" class="route-list">
                <div class="route-diagram loading">正在加载 Mermaid 流程图...</div>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.2/lib/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <script type="module" src="/static/app.js?v=25"></script>
  </body>
</html>
