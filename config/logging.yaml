version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(message)s"
    datefmt: "%H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
loggers:
  agent:
    level: INFO  # 可以在这里修改日志输出等级 (DEBUG, INFO, WARNING, ERROR)
    handlers: [console]
    propagate: no
root:
  level: WARNING
  handlers: [console]
